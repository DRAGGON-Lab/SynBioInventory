[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "draggon-inventory-sbol"
version = "0.1.0"
description = "SBOL-oriented domain helpers for SynBioInventory"
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "DRAGGON Lab"}]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
