[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "draggon-inventory-sbol"
version = "0.1.0"
description = "SBOL-oriented domain helpers for SynBioInventory"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "DRAGGON Lab" }]
dependencies = [
  "rdflib>=7.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
