[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "draggon-inventory-sbol"
version = "0.1.0"
description = "SBOL domain helpers for SynBioInventory MVP"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "rdflib>=7.0.0",
  "pydantic>=2.7.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
